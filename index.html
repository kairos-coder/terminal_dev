const BAND_ORDER = ['hermes','apollo','hephaestus','demeter','poseidon','athena','zeus'];

function getBandFromWordCount(n) {

// ============================================================

const CLUSTERS = {
    decay:   { words: ['ash','bone','rust','dust','hollow','ruin','rot','silt','husk','marrow','splinter','char','residue','fragment','remnant'] },
    light:   { words: ['ember','threshold','dawn','signal','pulse','gleam','flicker','ignite','radiance','luminous','kindle','aureole','beacon','solstice','corona'] },

const SUBJECTS = ['The raven','The forge','An ember','The river','A threshold','The dreamer','The watcher','A blade','The tide','Memory','Silence','The ancient flame','A root system','The void','Dust','Iron','The gate','The oracle','A hollow bone','The current','Residue','The exile'];
const VERBS = ['carries','holds','breaks','remembers','forgets','burns','returns','rises','fractures','echoes','consumes','reveals','dissolves','endures','recedes','descends','illuminates','devours','persists','collapses','accumulates','drifts','spirals','marks','inscribes','tempers','suspends'];
const ABSTRACT = ['consciousness','impermanence','recursion','entropy','emergence','paradox','resonance','dissolution','transcendence','fragmentation','memory','longing','threshold','void','fate','wisdom','chaos','silence','truth','absence','oscillation','continuity','rupture','interval','sediment','trace'];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randN(arr, n) { return [...arr].sort(() => 0.5 - Math.random()).slice(0, n); }
function wc(str) { return str.trim().split(/\s+/).filter(Boolean).length; }
function cap(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

// ============================================================
// DEMETER MARKUP — Scoring Rules
// ============================================================
function demeterMarkup(input, cluster) {
    const words = input.body.split(/\s+/);
    const text = input.body;
    
    const uniqueWords = new Set(words.map(w => w.toLowerCase().replace(/[^a-z]/g, '')));
    const lexicalDensity = uniqueWords.size / words.length;
    
    let abstractCount = 0;
    ABSTRACT.forEach(ab => { if (text.toLowerCase().includes(ab)) abstractCount++; });
    abstractCount = Math.min(abstractCount, 5);
    
    const sentenceCount = (text.match(/[.!?]/g) || []).length;
    
    let purityScore = 1.0;
    const trigrams = [];
    for (let i = 0; i < words.length - 2; i++) {
        const tri = words.slice(i, i+3).join(' ').toLowerCase();
        if (trigrams.includes(tri)) { purityScore -= 0.1; }
        trigrams.push(tri);
    }
    purityScore = Math.max(0, purityScore);
    
    const clusterWords = CLUSTERS[cluster]?.words || CLUSTERS.void.words;
    let clusterAlignment = 0;
    clusterWords.forEach(cw => { if (text.toLowerCase().includes(cw)) clusterAlignment++; });
    clusterAlignment = Math.min(1, clusterAlignment / 5);
    
    let driftLevel = 0;
    const otherClusters = CLUSTER_NAMES.filter(c => c !== cluster);
    otherClusters.forEach(oc => {
        CLUSTERS[oc].words.forEach(ow => { if (text.toLowerCase().includes(ow)) driftLevel += 0.02; });
    });
    driftLevel = Math.min(1, driftLevel);
    
    const healthScore = Math.round(
        (lexicalDensity * 25) + (abstractCount * 5) + (Math.min(sentenceCount, 4) * 6.25) +
        (purityScore * 25) + (clusterAlignment * 25) - (driftLevel * 20)
    );
    
    return {
        lexicalDensity: Math.round(lexicalDensity * 100),
        abstractCount, sentenceCount, purityScore: Math.round(purityScore * 100),
        clusterAlignment: Math.round(clusterAlignment * 100), driftLevel: Math.round(driftLevel * 100),
        healthScore: Math.max(0, Math.min(100, healthScore))
    };
}

// ============================================================
// DEMETER MARKUP — Transformation Rules
// ============================================================
function demeterTransform(input, cluster, scores) {
    let body = input.body;
    let words = body.split(/\s+/);
    
    if (scores.driftLevel > 60 || scores.purityScore < 50) {
        body = body.replace(/(\b\w+\b)(?: \1)+/gi, '$1');
        body = body.replace(/\b(very|really|quite|extremely|incredibly)\b/gi, '');
        words = body.split(/\s+/);
        if (words.length > 30) words = words.slice(0, Math.floor(words.length * 0.8));
        body = words.join(' ');
    }
    
    if (scores.lexicalDensity < 40 || scores.abstractCount < 1) {
        const clusterWords = CLUSTERS[cluster]?.words || CLUSTERS.void.words;
        const groundingNouns = clusterWords.slice(0, 5);
        const sensoryAnchors = ['ash', 'stone', 'water', 'fire', 'wind', 'earth', 'void'];
        const temporalMarkers = ['before', 'after', 'during', 'while', 'as', 'when'];
        
        if (scores.abstractCount < 1 && groundingNouns[0]) {
            body += ` ${groundingNouns[0]} and ${groundingNouns[1] || groundingNouns[0]}`;
        }
        if (scores.lexicalDensity < 40) {
            body += ` like ${sensoryAnchors[Math.floor(Math.random() * sensoryAnchors.length)]}`;
        }
        if (words.length < 15) {
            body += ` ${temporalMarkers[Math.floor(Math.random() * temporalMarkers.length)]} the ${cluster} returns`;
        }
        words = body.split(/\s+/);
    }
    
    if (scores.clusterAlignment < 40) {
        const clusterWords = CLUSTERS[cluster]?.words || CLUSTERS.void.words;
        const steeringWord = clusterWords[Math.floor(Math.random() * clusterWords.length)];
        body = `${cap(steeringWord)} ${body}`;
        words = body.split(/\s+/);
    }
    
    if (scores.driftLevel > 50) {
        const anchor = CLUSTERS[cluster]?.words[0] || 'threshold';
        body = `${cap(anchor)} carries ${body.toLowerCase()}`;
        words = body.split(/\s+/);
    }
    
    if (!/[.!?]$/.test(body)) body += '.';
    
    return { body, wordCount: words.length,
        pruningApplied: scores.driftLevel > 60 || scores.purityScore < 50,
        expansionApplied: scores.lexicalDensity < 40 || scores.abstractCount < 1,
        steeringApplied: scores.clusterAlignment < 40,
        driftCorrectionApplied: scores.driftLevel > 50
    };
}

// ============================================================
// EVOLUTION STATE — INFINITE PASS SYSTEM

let evolutionActive = true;

// ============================================================
// SINGLE BAND EVOLUTION (with full gates)
// ============================================================
async function evolveSingleBand(band, previousResult) {
    const bandInfo = DIVINE_BANDS[band];
    let result = { body: '', wordCount: 0, passedGate: true, scores: null, transformed: null };
    
    if (band === 'hermes') {
        activeCluster = rand(CLUSTER_NAMES);
        const pool = CLUSTERS[activeCluster].words;
        const count = 1 + Math.floor(Math.random() * 2);
        const words = randN(pool, count);
        result = { body: words.join(' '), wordCount: words.length, passedGate: true };
    }
    else if (band === 'apollo') {
        const seedWords = previousResult.body.split(/\s+/);
        const pool = CLUSTERS[activeCluster].words;
        const needed = 3 + Math.floor(Math.random() * 3);
        const extra = randN(pool.filter(w => !seedWords.includes(w)), needed - seedWords.length);
        const words = [...seedWords, ...extra].slice(0, needed);
        words[0] = cap(words[0]);
        result = { body: words.join(' '), wordCount: words.length, passedGate: true };
    }
    else if (band === 'hephaestus') {
        const subject = rand(SUBJECTS);
        const verb = rand(VERBS);
        const obj = [...previousResult.body.split(/\s+/), ...randN(CLUSTERS[activeCluster]?.words || CLUSTERS.void.words, 3)].slice(0,5).join(' ').toLowerCase();
        const raw = `${subject} ${verb} ${obj}`;
        const words = raw.split(/\s+/).slice(0, 10);
        const body = words.join(' ') + '.';
        const hasSubject = /^[A-Z]/.test(body);
        const hasVerb = VERBS.some(v => body.includes(` ${v} `));
        const hasObject = words.length >= 6;
        const passed = hasSubject && hasVerb && hasObject;
        result = { body, wordCount: words.length, passedGate: passed };
    }
    else if (band === 'demeter') {
        let body = previousResult.body;
        let words = body.split(/\s+/);
        while (words.length < 11) {
            const clusterWords = CLUSTERS[activeCluster]?.words || CLUSTERS.void.words;
            body = `${body} ${rand(clusterWords)}`;
            words = body.split(/\s+/);
        }
        const scores = demeterMarkup({ body }, activeCluster);
        const transformed = demeterTransform({ body }, activeCluster, scores);
        body = transformed.body;
        words = body.split(/\s+/);
        words = words.slice(0, 20);
        body = words.join(' ');
        if (!/[.!?]$/.test(body)) body += '.';
        result = { body, wordCount: words.length, passedGate: true, scores, transformed };
    }
    else if (band === 'poseidon') {
        let body = previousResult.body.replace(/\.$/, '');
        let words = body.split(/\s+/);
        const expansions = [
            () => `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(CLUSTERS[activeCluster]?.words || 'void')} cannot contain.`,
            () => `In the space between ${rand(CLUSTERS[activeCluster]?.words)} and ${rand(CLUSTERS[activeCluster]?.words)}, ${rand(ABSTRACT)} accumulates.`,
            () => `Where ${rand(CLUSTERS[activeCluster]?.words)} meets ${rand(CLUSTERS[activeCluster]?.words)}, something ${rand(VERBS)}.`,
            () => `${rand(CLUSTERS[activeCluster]?.words)} against ${rand(ABSTRACT)} — ${rand(SUBJECTS).toLowerCase()} ${rand(VERBS)}.`
        ];
        while (words.length < 21) {
            body = `${body} ${rand(expansions)()}`;
            words = body.split(/\s+/);
        }
        words = words.slice(0, 35);
        body = words.join(' ');
        if (!/[.!?]$/.test(body)) body += '.';
        result = { body, wordCount: words.length, passedGate: true };
    }
    else if (band === 'athena') {
        let body = previousResult.body.replace(/[.!?]$/, '');
        let words = body.split(/\s+/);
        while (words.length < 36) {
            const s = `${rand(SUBJECTS)} ${rand(VERBS)} ${rand(CLUSTERS[activeCluster]?.words)} — ${rand(ABSTRACT)} without ${rand(CLUSTERS[activeCluster]?.words)}.`;
            body = `${body} ${s}`;
            words = body.split(/\s+/);
        }
        words = words.slice(0, 50);
        body = words.join(' ');
        if (!/[.!?—]$/.test(body)) body += '.';
        
        const total = words.length;
        const unique = new Set(words.map(w => w.toLowerCase().replace(/[^a-z]/g,''))).size;
        const lexDen = unique / total;
        const absCount = ABSTRACT.filter(a => body.toLowerCase().includes(a)).length;
        const sentCount = (body.match(/[.!?]/g) || []).length;
        const trigrams = [];
        let hasPadding = false;
        for (let i = 0; i < words.length - 2; i++) {
            const tri = words.slice(i,i+3).join(' ').toLowerCase();
            if (trigrams.includes(tri)) { hasPadding = true; break; }
            trigrams.push(tri);
        }
        let score = 0;
        if (lexDen >= 0.72) score += 25;
        if (absCount >= 1) score += 25;
        if (sentCount >= 2) score += 25;
        if (!hasPadding) score += 25;
        const passed = score >= 70;
        result = { body, wordCount: total, wisdomScore: score, passedGate: passed };
    }
    else if (band === 'zeus') {
        let body = previousResult.body.replace(/[.!?—]$/, '');
        let words = body.split(/\s+/);
        while (words.length < 51) {
            const t = `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(ABSTRACT)} conceals — ${rand(CLUSTERS[activeCluster]?.words)}, ${rand(CLUSTERS[activeCluster]?.words)}, the ${rand(ABSTRACT)} of ${rand(CLUSTERS[activeCluster]?.words)}.`;
            body = `${body} ${t}`;
            words = body.split(/\s+/);
        }
        words = words.slice(0, 64);
        body = words.join(' ');
        if (!/[.!?—]$/.test(body)) body += '.';
        result = { body, wordCount: words.length, passedGate: true };
    }
    
    return result;
}

// ============================================================
// SAVE TO BAND TABLE
// ============================================================
async function saveToBandTable(band, result, passNum) {
    if (!db) return false;
    const bandInfo = DIVINE_BANDS[band];
    const label = `pass_${passNum}_${band}_${Date.now()}`;
    const { error } = await db.from(bandInfo.table).insert({
        label: label, body: result.body, word_count: result.wordCount, created_at: new Date().toISOString()
    });
    if (error) { printLine(`   ⚠ save failed: ${error.message}`, 'sys'); return false; }
    return true;
}

// ============================================================
// RUN A SINGLE PASS
// ============================================================
async function runPass() {
    if (!evolutionActive) return;
    
    const godsInThisPass = BAND_ORDER.slice(0, currentPass);
    const passIcons = godsInThisPass.map(b => DIVINE_BANDS[b].icon).join(' → ');
    printLine(`\n🎵 PASS ${currentPass}/${MAX_PASS} — ${godsInThisPass.length} gods: ${passIcons}`, 'sys');
    
    let previousResult = null;
    let finalBand = null;
    let finalResult = null;
    
    for (const band of godsInThisPass) {
        const bandInfo = DIVINE_BANDS[band];
        const mythicLine = getMythicLine(band);
        if (mythicLine) printLine(mythicLine, 'sysdim');
        
        const result = await evolveSingleBand(band, previousResult);
        previousResult = result;
        finalBand = band;
        finalResult = result;
        
        if (band === 'demeter' && result.scores) {
            const s = result.scores;
            const t = result.transformed;
            const healthClass = s.healthScore >= 70 ? 'demeter-health-high' : (s.healthScore >= 40 ? 'demeter-health-mid' : 'demeter-health-low');
            printLine(`🌾 Demeter markup: health ${s.healthScore}% · lex ${s.lexicalDensity}% · abs ${s.abstractCount} · purity ${s.purityScore}% · align ${s.clusterAlignment}% · drift ${s.driftLevel}%`, 'demeter-markup');
            if (t.pruningApplied) printLine(`   ✂️ pruned`, 'sysdim');
            if (t.expansionApplied) printLine(`   🌱 expanded`, 'sysdim');
            if (t.steeringApplied) printLine(`   🧭 steered`, 'sysdim');
            if (t.driftCorrectionApplied) printLine(`   ⚓ drift corrected`, 'sysdim');
        }
        
        if (band === 'athena' && !result.passedGate) {
            printLine(`🦉 Athena rejects ${result.wisdomScore}% (need 70%) · retry`, 'gate-fail');
            return;
        }
        if (band === 'athena' && result.passedGate) {
            printLine(`🦉 Athena accepts ${result.wisdomScore}%`, 'gate-pass');
        }
        
        if (band === 'hephaestus' && !result.passedGate) {
            printLine(`🔥 Hephaestus rejects · chain restarts`, 'gate-fail');
            return;
        }
        
        const preview = result.body.substring(0, 60) + (result.body.length > 60 ? '...' : '');
        if (band === 'zeus') {
            printLine(`${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}φ·${(bandInfo.time/1000).toFixed(2)}s) [${result.wordCount}w]`, band);
            printLine(result.body, 'zeus-full');
        } else {
            printLine(`${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}φ·${(bandInfo.time/1000).toFixed(2)}s) [${result.wordCount}w] "${preview}"`, band);
        }
        
        await new Promise(r => setTimeout(r, bandInfo.time));
    }
    
    const saved = await saveToBandTable(finalBand, finalResult, currentPass);
    if (saved) {
        printLine(`   ✓ saved to ${DIVINE_BANDS[finalBand].icon} ${DIVINE_BANDS[finalBand].name} hoard`, 'gate-pass');
    }
    
    currentPass++;
    if (currentPass > MAX_PASS) {
        currentPass = 1;
        printLine(`⟳ CYCLE COMPLETE. Starting new cycle from Pass 1.`, 'sys');
    }
    
    passTimer = setTimeout(() => runPass(), 3000);
}

function startPassSystem() {
    if (passTimer) clearTimeout(passTimer);
    evolutionActive = true;
    currentPass = 1;
    runPass();
}

function pausePassSystem() {
    evolutionActive = false;
    if (passTimer) clearTimeout(passTimer);
}

// ============================================================
// DREAM CYCLE (idle)
// ============================================================
let awakePulseCount = 0;
let pulseInterval = null;
let isDreaming = false;

function updateCounter() {
    const el = document.getElementById('counter');
    if (el) el.textContent = `${awakePulseCount}/30`;
}

function startAwakePulses() {
    if (pulseInterval) clearInterval(pulseInterval);
    pulseInterval = setInterval(() => {
        if (!isDreaming) {
            awakePulseCount++;
            updateCounter();
            if (awakePulseCount >= 30) enterDream();
        }
    }, 1618);
}

async function enterDream() {
    isDreaming = true;
    pausePassSystem();
    document.getElementById('statusLed').classList.add('dreaming');
    document.getElementById('stateLabel').textContent = 'DREAMING';
    printLine('', null);
    printLine('✦ dreaming — reaching into the hoard…', 'dream');
    
    let seedFound = false;
    for (const table of ['hermes_entries', 'apollo_entries', 'hephaestus_entries', 'zeus_entries']) {
        const { data } = await db.from(table).select('body, label').limit(10);
        if (data && data.length > 0) {
            const entry = data[Math.floor(Math.random() * data.length)];
            const words = entry.body.split(/\s+/).slice(0, 2);
            const cluster = CLUSTER_NAMES.find(c => entry.label.includes(c)) || rand(CLUSTER_NAMES);
            printLine(`  fragment: "${words.join(' ')}" · cluster: ${cluster}`, 'dream');
            seedFound = true;
            break;
        }
    }
    if (!seedFound) {
        printLine(`  hoard empty — dreaming from void`, 'dream');
    }
    
    setTimeout(exitDream, 7000);
}

function exitDream() {
    isDreaming = false;
    awakePulseCount = 0;
    updateCounter();
    document.getElementById('statusLed').classList.remove('dreaming');
    document.getElementById('stateLabel').textContent = 'AWAKE';
    printLine(`✦ wakes · resuming passes`, 'dream');
    printLine('', null);
    startPassSystem();
}

// ============================================================
// OUTPUT
// ============================================================
function printLine(text, cls = null) {
    const output = document.getElementById('output');
    const line = document.createElement('div');
    line.textContent = text;
    const direct = ['gate-pass','gate-fail','sys','sysdim','dream','zeus-full','demeter-markup','demeter-health-high','demeter-health-mid','demeter-health-low'];
    if (cls && direct.includes(cls)) line.classList.add(cls);
    else if (cls && DIVINE_BANDS[cls]) line.classList.add(`band-${cls}`);
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

async function processCommand(input) {
    if (!input.trim()) return;
    awakePulseCount = 0;
    updateCounter();
    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    if (KNOWN_COMMANDS.includes(cmd)) {
        const result = await commands[cmd](args, input);
        if (result) printLine(result);
        return;
    }
    const body = input.trim();
    const n = wc(body);
    const band = getBandFromWordCount(n);
    const info = DIVINE_BANDS[band];
    printLine(`   ${n}w · ${info.icon} ${info.name} (${info.min}–${info.max}w) → "add <label>: ${body}" to save`, 'sysdim');
}
