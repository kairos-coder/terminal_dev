<script>
// ============================================================
// KAIROS TERMINAL v4.4
// DEMETER MARKUP вҖ” early scoring + pruning + expansion + steering
// The gardener between Hephaestus and Poseidon
// ============================================================

const SUPABASE_URL      = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

let db             = null;
let commandHistory = [];
let historyIndex   = -1;

// ============================================================
// BAND CONFIGURATION вҖ” 64w Zeus hard cap
// ============================================================
const DIVINE_BANDS = {
    hermes:     { index:1, icon:'вңҲпёҸ',  name:'Hermes',     table:'hermes_entries',     min:1,  max:2,  target:2,  time:1618, color:'#d4956a' },
    apollo:     { index:2, icon:'вҳҖпёҸ',  name:'Apollo',     table:'apollo_entries',     min:3,  max:5,  target:4,  time:2427, color:'#c9a84c' },
    hephaestus: { index:3, icon:'рҹ”Ҙ',  name:'Hephaestus', table:'hephaestus_entries', min:6,  max:10, target:8,  time:3236, color:'#b84a00' },
    demeter:    { index:4, icon:'рҹҢҫ',  name:'Demeter',    table:'demeter_entries',    min:11, max:20, target:15, time:4045, color:'#6b8e23' },
    poseidon:   { index:5, icon:'рҹҢҠ',  name:'Poseidon',   table:'poseidon_entries',   min:21, max:35, target:28, time:4854, color:'#2a5e8a' },
    athena:     { index:6, icon:'рҹҰү',  name:'Athena',     table:'athena_entries',     min:36, max:50, target:43, time:5663, color:'#7a3a9a', threshold:70 },
    zeus:       { index:7, icon:'вҡЎ',  name:'Zeus',       table:'zeus_entries',       min:51, max:64, target:57, time:6472, color:'#7e57c2' }
};

const BAND_ORDER = ['hermes','apollo','hephaestus','demeter','poseidon','athena','zeus'];

function getBandFromWordCount(n) {
    if (n <= 2)  return 'hermes';
    if (n <= 5)  return 'apollo';
    if (n <= 10) return 'hephaestus';
    if (n <= 20) return 'demeter';
    if (n <= 35) return 'poseidon';
    if (n <= 50) return 'athena';
    return 'zeus';
}

// ============================================================
// SEMANTIC CLUSTERS вҖ” source of resonance
// ============================================================
const CLUSTERS = {
    decay:   { words: ['ash','bone','rust','dust','hollow','ruin','rot','silt','husk','marrow','splinter','char','residue','fragment','remnant'] },
    light:   { words: ['ember','threshold','dawn','signal','pulse','gleam','flicker','ignite','radiance','luminous','kindle','aureole','beacon','solstice','corona'] },
    memory:  { words: ['echo','thread','trace','residue','mark','imprint','fossil','sediment','inscription','archive','relic','refrain','palimpsest','vestige','scar'] },
    motion:  { words: ['tide','current','drift','spiral','return','surge','oscillate','cycle','recede','cascade','flux','eddy','undulate','momentum','vortex'] },
    void:    { words: ['silence','gap','absence','depth','between','hollow','abyss','lacuna','suspension','interval','pause','null','negative','liminal','recess'] },
    forge:   { words: ['iron','hammer','anvil','temper','alloy','slag','crucible','weld','smelt','quench','mold','cast','strike','fuse','reforge'] },
    myth:    { words: ['serpent','raven','phoenix','wolf','oracle','augur','sovereign','exile','wanderer','threshold','labyrinth','augury','omen','sigil','totem'] }
};
const CLUSTER_NAMES = Object.keys(CLUSTERS);

// Universal pools
const SUBJECTS = [
    'The raven','The forge','An ember','The river','A threshold','The dreamer',
    'The watcher','A blade','The tide','Memory','Silence','The ancient flame',
    'A root system','The void','Dust','Iron','The gate','The oracle',
    'A hollow bone','The current','Residue','The exile'
];
const VERBS = [
    'carries','holds','breaks','remembers','forgets','burns','returns','rises',
    'fractures','echoes','consumes','reveals','dissolves','endures','recedes',
    'descends','illuminates','devours','persists','collapses','accumulates',
    'drifts','spirals','marks','inscribes','tempers','suspends'
];
const ABSTRACT = [
    'consciousness','impermanence','recursion','entropy','emergence','paradox',
    'resonance','dissolution','transcendence','fragmentation','memory','longing',
    'threshold','void','fate','wisdom','chaos','silence','truth','absence',
    'oscillation','continuity','rupture','interval','sediment','trace'
];

function rand(arr)     { return arr[Math.floor(Math.random() * arr.length)]; }
function randN(arr, n) { return [...arr].sort(() => 0.5 - Math.random()).slice(0, n); }
function wc(str)       { return str.trim().split(/\s+/).filter(Boolean).length; }
function cap(str)      { return str.charAt(0).toUpperCase() + str.slice(1); }

// ============================================================
// DEMETER MARKUP вҖ” Scoring Rules
// ============================================================
function demeterMarkup(input, cluster) {
    const words = input.body.split(/\s+/);
    const text = input.body;
    
    // 1. Lexical Density (unique words / total words)
    const uniqueWords = new Set(words.map(w => w.toLowerCase().replace(/[^a-z]/g, '')));
    const lexicalDensity = uniqueWords.size / words.length;
    
    // 2. Abstract Noun Count
    const abstractNouns = ABSTRACT;
    let abstractCount = 0;
    abstractNouns.forEach(ab => { if (text.toLowerCase().includes(ab)) abstractCount++; });
    abstractCount = Math.min(abstractCount, 5);
    
    // 3. Sentence Count
    const sentenceCount = (text.match(/[.!?]/g) || []).length;
    
    // 4. Purity Score (no repetition, no padding)
    let purityScore = 1.0;
    const trigrams = [];
    for (let i = 0; i < words.length - 2; i++) {
        const tri = words.slice(i, i+3).join(' ').toLowerCase();
        if (trigrams.includes(tri)) { purityScore -= 0.1; }
        trigrams.push(tri);
    }
    purityScore = Math.max(0, purityScore);
    
    // 5. Cluster Alignment
    const clusterWords = CLUSTERS[cluster]?.words || CLUSTERS.void.words;
    let clusterAlignment = 0;
    clusterWords.forEach(cw => {
        if (text.toLowerCase().includes(cw)) clusterAlignment++;
    });
    clusterAlignment = Math.min(1, clusterAlignment / 5);
    
    // 6. Drift Level (deviation from cluster)
    let driftLevel = 0;
    const otherClusters = CLUSTER_NAMES.filter(c => c !== cluster);
    otherClusters.forEach(oc => {
        CLUSTERS[oc].words.forEach(ow => {
            if (text.toLowerCase().includes(ow)) driftLevel += 0.02;
        });
    });
    driftLevel = Math.min(1, driftLevel);
    
    // 7. Health Score (0-100)
    const healthScore = Math.round(
        (lexicalDensity * 25) +
        (abstractCount * 5) +
        (Math.min(sentenceCount, 4) * 6.25) +
        (purityScore * 25) +
        (clusterAlignment * 25) -
        (driftLevel * 20)
    );
    
    return {
        lexicalDensity: Math.round(lexicalDensity * 100),
        abstractCount,
        sentenceCount,
        purityScore: Math.round(purityScore * 100),
        clusterAlignment: Math.round(clusterAlignment * 100),
        driftLevel: Math.round(driftLevel * 100),
        healthScore: Math.max(0, Math.min(100, healthScore))
    };
}

// ============================================================
// DEMETER MARKUP вҖ” Transformation Rules
// ============================================================
function demeterTransform(input, cluster, scores) {
    let body = input.body;
    let words = body.split(/\s+/);
    
    // в”Җв”Җ PRUNING (if too chaotic) в”Җв”Җ
    if (scores.driftLevel > 60 || scores.purityScore < 50) {
        body = body.replace(/(\b\w+\b)(?: \1)+/gi, '$1');
        body = body.replace(/\b(very|really|quite|extremely|incredibly)\b/gi, '');
        words = body.split(/\s+/);
        if (words.length > 30) {
            words = words.slice(0, Math.floor(words.length * 0.8));
            body = words.join(' ');
        }
    }
    
    // в”Җв”Җ EXPANSION (if too thin) в”Җв”Җ
    if (scores.lexicalDensity < 40 || scores.abstractCount < 1) {
        const clusterWords = CLUSTERS[cluster]?.words || CLUSTERS.void.words;
        const groundingNouns = clusterWords.slice(0, 5);
        const sensoryAnchors = ['ash', 'stone', 'water', 'fire', 'wind', 'earth', 'void'];
        const temporalMarkers = ['before', 'after', 'during', 'while', 'as', 'when'];
        
        if (scores.abstractCount < 1 && groundingNouns[0]) {
            body += ` ${groundingNouns[0]} and ${groundingNouns[1] || groundingNouns[0]}`;
        }
        if (scores.lexicalDensity < 40) {
            body += ` like ${sensoryAnchors[Math.floor(Math.random() * sensoryAnchors.length)]}`;
        }
        if (words.length < 15) {
            body += ` ${temporalMarkers[Math.floor(Math.random() * temporalMarkers.length)]} the ${cluster} returns`;
        }
        words = body.split(/\s+/);
    }
    
    // в”Җв”Җ CLUSTER STEERING в”Җв”Җ
    if (scores.clusterAlignment < 40) {
        const clusterWords = CLUSTERS[cluster]?.words || CLUSTERS.void.words;
        const steeringWord = clusterWords[Math.floor(Math.random() * clusterWords.length)];
        body = `${cap(steeringWord)} ${body}`;
        words = body.split(/\s+/);
    }
    
    // в”Җв”Җ DRIFT CORRECTION в”Җв”Җ
    if (scores.driftLevel > 50) {
        const anchor = CLUSTERS[cluster]?.words[0] || 'threshold';
        body = `${cap(anchor)} carries ${body.toLowerCase()}`;
        words = body.split(/\s+/);
    }
    
    if (!/[.!?]$/.test(body)) body += '.';
    
    return {
        body: body,
        wordCount: words.length,
        pruningApplied: scores.driftLevel > 60 || scores.purityScore < 50,
        expansionApplied: scores.lexicalDensity < 40 || scores.abstractCount < 1,
        steeringApplied: scores.clusterAlignment < 40,
        driftCorrectionApplied: scores.driftLevel > 50
    };
}

// ============================================================
// GATE FUNCTIONS
// ============================================================

let activeCluster = null;
let chainState = { demeterScores: null, demeterTransforms: null };

function hermesGate(seed = null) {
    if (seed && seed.cluster) {
        activeCluster = seed.cluster;
        return { body: seed.words.slice(0,2).join(' '), wordCount: seed.words.length, fromHoard: true };
    }
    activeCluster = rand(CLUSTER_NAMES);
    const pool = CLUSTERS[activeCluster].words;
    const count = 1 + Math.floor(Math.random() * 2);
    const words = randN(pool, count);
    return { body: words.join(' '), wordCount: words.length, fromHoard: false };
}

function apolloGate(prev) {
    const pool = CLUSTERS[activeCluster].words;
    const seedWords = prev.body.split(/\s+/);
    const needed = 3 + Math.floor(Math.random() * 3);
    const extra = randN(pool.filter(w => !seedWords.includes(w)), needed - seedWords.length);
    const words = [...seedWords, ...extra].slice(0, needed);
    words[0] = cap(words[0]);
    return { body: words.join(' '), wordCount: words.length };
}

function hephaestusGate(prev) {
    const subject = rand(SUBJECTS);
    const verb = rand(VERBS);
    const obj = [...prev.body.split(/\s+/), ...randN(CLUSTERS[activeCluster]?.words || CLUSTERS.void.words, 3)].slice(0,5).join(' ').toLowerCase();
    const raw = `${subject} ${verb} ${obj}`;
    const words = raw.split(/\s+/).slice(0, 10);
    const body = words.join(' ') + '.';
    const hasSubject = /^[A-Z]/.test(body);
    const hasVerb = VERBS.some(v => body.includes(` ${v} `));
    const hasObject = words.length >= 6;
    const inRange = words.length >= 6 && words.length <= 10;
    const passed = hasSubject && hasVerb && hasObject && inRange;
    return { body, wordCount: words.length, passedGate: passed, debug: { hasSubject, hasVerb, hasObject, inRange } };
}

// DEMETER: GARDENER + EARLY SCORING
function demeterGate(prev) {
    let body = prev.body;
    let words = body.split(/\s+/);
    
    while (words.length < 11) {
        const clusterWords = CLUSTERS[activeCluster]?.words || CLUSTERS.void.words;
        body = `${body} ${rand(clusterWords)}`;
        words = body.split(/\s+/);
    }
    
    const scores = demeterMarkup({ body }, activeCluster);
    const transformed = demeterTransform({ body }, activeCluster, scores);
    body = transformed.body;
    words = body.split(/\s+/);
    
    words = words.slice(0, 20);
    body = words.join(' ');
    if (!/[.!?]$/.test(body)) body += '.';
    
    chainState.demeterScores = scores;
    chainState.demeterTransforms = transformed;
    
    return { body, wordCount: words.length, scores, transformed };
}

function poseidonGate(prev) {
    const pool = CLUSTERS[activeCluster].words;
    let body = prev.body.replace(/\.$/, '');
    let words = body.split(/\s+/);
    const expansions = [
        () => `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(pool)} cannot contain.`,
        () => `In the space between ${rand(pool)} and ${rand(pool)}, ${rand(ABSTRACT)} accumulates.`,
        () => `Where ${rand(pool)} meets ${rand(pool)}, something ${rand(VERBS)}.`,
        () => `${rand(pool)} against ${rand(ABSTRACT)} вҖ” ${rand(SUBJECTS).toLowerCase()} ${rand(VERBS)}.`
    ];
    while (words.length < 21) {
        body = `${body} ${rand(expansions)()}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 35);
    body = words.join(' ');
    if (!/[.!?]$/.test(body)) body += '.';
    return { body, wordCount: words.length };
}

function athenaGate(prev) {
    const pool = CLUSTERS[activeCluster]?.words || CLUSTERS.void.words;
    let body = prev.body.replace(/[.!?]$/, '');
    let words = body.split(/\s+/);
    while (words.length < 36) {
        const s = `${rand(SUBJECTS)} ${rand(VERBS)} ${rand(pool)} вҖ” ${rand(ABSTRACT)} without ${rand(pool)}.`;
        body = `${body} ${s}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 50);
    body = words.join(' ');
    if (!/[.!?вҖ”]$/.test(body)) body += '.';
    
    const total = words.length;
    const unique = new Set(words.map(w => w.toLowerCase().replace(/[^a-z]/g,''))).size;
    const lexDen = unique / total;
    const absCount = ABSTRACT.filter(a => body.toLowerCase().includes(a)).length;
    const sentCount = (body.match(/[.!?]/g) || []).length;
    const trigrams = [];
    let hasPadding = false;
    for (let i = 0; i < words.length - 2; i++) {
        const tri = words.slice(i,i+3).join(' ').toLowerCase();
        if (trigrams.includes(tri)) { hasPadding = true; break; }
        trigrams.push(tri);
    }
    let score = 0;
    const bd = {};
    if (lexDen >= 0.72) { score += 25; bd.A = `вң“ lex(${(lexDen*100).toFixed(0)}%)`; }
    else { bd.A = `вң— lex(${(lexDen*100).toFixed(0)}%)`; }
    if (absCount >= 1) { score += 25; bd.B = `вң“ abs(${absCount})`; }
    else { bd.B = `вң— abs(0)`; }
    if (sentCount >= 2) { score += 25; bd.C = `вң“ snt(${sentCount})`; }
    else { bd.C = `вң— snt(${sentCount})`; }
    if (!hasPadding) { score += 25; bd.D = `вң“ pure`; }
    else { bd.D = `вң— repeat`; }
    return { body, wordCount: total, wisdomScore: score, passedGate: score >= 70, breakdown: bd };
}

function zeusGate(prev) {
    const pool = CLUSTERS[activeCluster]?.words || CLUSTERS.void.words;
    let body = prev.body.replace(/[.!?вҖ”]$/, '');
    let words = body.split(/\s+/);
    while (words.length < 51) {
        const t = `${rand(SUBJECTS)} ${rand(VERBS)} what ${rand(ABSTRACT)} conceals вҖ” ${rand(pool)}, ${rand(pool)}, the ${rand(ABSTRACT)} of ${rand(pool)}.`;
        body = `${body} ${t}`;
        words = body.split(/\s+/);
    }
    words = words.slice(0, 64);
    body = words.join(' ');
    if (!/[.!?вҖ”]$/.test(body)) body += '.';
    return { body, wordCount: words.length };
}

// ============================================================
// EVOLUTION ENGINE
// ============================================================
let evolutionActive = false;
let evolutionTimer = null;
let currentBandIndex = 0;
let currentChain = {};
let chainStats = { runs:0, hepRejects:0, athenaRejects:0, saved:0 };

async function runEvolutionStep() {
    if (!evolutionActive) return;
    const band = BAND_ORDER[currentBandIndex];
    const bandInfo = DIVINE_BANDS[band];
    const prev = currentChain[BAND_ORDER[currentBandIndex - 1]] || {};
    let result;
    
    switch (band) {
        case 'hermes':     result = hermesGate(currentChain.__seed__ || null); break;
        case 'apollo':     result = apolloGate(prev); break;
        case 'hephaestus': result = hephaestusGate(prev); break;
        case 'demeter':    result = demeterGate(prev); break;
        case 'poseidon':   result = poseidonGate(prev); break;
        case 'athena':     result = athenaGate(prev); break;
        case 'zeus':       result = zeusGate(prev); break;
    }
    
    if (band === 'hephaestus' && !result.passedGate) {
        chainStats.hepRejects++;
        markDotRejected(currentBandIndex);
        const d = result.debug;
        printLine(`рҹ”Ҙ Hephaestus rejects В· S:${d.hasSubject?'вң“':'вң—'} V:${d.hasVerb?'вң“':'вң—'} O:${d.hasObject?'вң“':'вң—'} В· chain restarts`, 'gate-fail');
        scheduleRestart(2500);
        return;
    }
    
    if (band === 'demeter') {
        const s = result.scores;
        const t = result.transformed;
        const healthClass = s.healthScore >= 70 ? 'demeter-health-high' : (s.healthScore >= 40 ? 'demeter-health-mid' : 'demeter-health-low');
        printLine(`рҹҢҫ Demeter markup: health ${s.healthScore}% В· lex ${s.lexicalDensity}% В· abs ${s.abstractCount} В· purity ${s.purityScore}% В· align ${s.clusterAlignment}% В· drift ${s.driftLevel}%`, 'demeter-markup');
        if (t.pruningApplied) printLine(`   вңӮпёҸ pruned (drift/purity)`, 'sysdim');
        if (t.expansionApplied) printLine(`   рҹҢұ expanded (lex/abs)`, 'sysdim');
        if (t.steeringApplied) printLine(`   рҹ§ӯ steered (cluster)`, 'sysdim');
        if (t.driftCorrectionApplied) printLine(`   вҡ“ drift corrected`, 'sysdim');
    }
    
    if (band === 'athena') {
        if (!result.passedGate) {
            chainStats.athenaRejects++;
            markDotRejected(currentBandIndex);
            const bd = result.breakdown;
            printLine(`рҹҰү Athena rejects ${result.wisdomScore}% В· ${bd.A} В· ${bd.B} В· ${bd.C} В· ${bd.D} вҶ’ retry Poseidon`, 'gate-fail');
            currentBandIndex = BAND_ORDER.indexOf('poseidon');
            evolutionTimer = setTimeout(runEvolutionStep, 2000);
            return;
        }
        const bd = result.breakdown;
        printLine(`рҹҰү Athena accepts ${result.wisdomScore}% В· ${bd.A} В· ${bd.B} В· ${bd.C} В· ${bd.D}`, 'gate-pass');
    }
    
    currentChain[band] = result;
    const clusterTag = (band === 'hermes') ? ` [${activeCluster}]` : '';
    const hoardTag = (band === 'hermes' && result.fromHoard) ? ' рҹ—„' : '';
    const timeSec = (bandInfo.time / 1000).toFixed(2);
    
    if (band === 'zeus') {
        printLine(`${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}ПҶВ·${timeSec}s) [${result.wordCount}w]`, band, true);
        printLine(result.body, 'zeus-full');
    } else {
        printLine(`${bandInfo.icon} ${bandInfo.name} (${bandInfo.index}ПҶВ·${timeSec}s) [${result.wordCount}w]${clusterTag}${hoardTag} "${result.body}"`, band, true);
    }
    
    activateDot(currentBandIndex);
    currentBandIndex++;
    
    if (currentBandIndex >= BAND_ORDER.length) {
        chainStats.runs++;
        printLine('', null);
        printLine(`вҡЎ chain #${chainStats.runs} В· cluster: ${activeCluster} В· ${currentChain.zeus.wordCount}w В· savingвҖҰ`, 'sys');
        persistZeus(currentChain.zeus.body, currentChain.zeus.wordCount, activeCluster);
        scheduleRestart(4000);
    } else {
        evolutionTimer = setTimeout(runEvolutionStep, bandInfo.time);
    }
}

function scheduleRestart(delay) {
    resetDots();
    currentBandIndex = 0;
    currentChain = {};
    chainState = { demeterScores: null, demeterTransforms: null };
    evolutionTimer = setTimeout(() => { if (evolutionActive) runEvolutionStep(); }, delay);
}

function startEvolution(seed = null) {
    if (evolutionTimer) clearTimeout(evolutionTimer);
    evolutionActive = true;
    currentBandIndex = 0;
    currentChain = seed ? { __seed__: seed } : {};
    chainState = { demeterScores: null, demeterTransforms: null };
    runEvolutionStep();
}

function pauseEvolution() {
    evolutionActive = false;
    if (evolutionTimer) clearTimeout(evolutionTimer);
}

// ============================================================
async function persistZeus(body, wordCount, cluster) {
    if (!db) return;
    const label = `${cluster}-${Date.now()}`;
    const { error } = await db.from('zeus_entries').insert({ label, body, word_count: wordCount, created_at: new Date().toISOString() });
    if (error) { printLine(`   вҡ  save failed: ${error.message}`, 'sys'); }
    else { chainStats.saved++; printLine(`   вң“ hoard вҶ’ zeus ["${label}"]`, 'sys'); }
}

async function getHoardSeed() {
    if (!db) return null;
    try {
        const { data, error } = await db.from('zeus_entries').select('body, label').limit(30);
        if (error || !data || !data.length) return null;
        const entry = data[Math.floor(Math.random() * data.length)];
        const labelCluster = CLUSTER_NAMES.find(c => entry.label.startsWith(c));
        const cluster = labelCluster || rand(CLUSTER_NAMES);
        const clusterWords = CLUSTERS[cluster].words.filter(w => entry.body.toLowerCase().includes(w));
        const words = clusterWords.length >= 2 ? randN(clusterWords, 2) : randN(CLUSTERS[cluster].words, 2);
        return { words, cluster };
    } catch { return null; }
}

// ============================================================
// DREAM CYCLE
// ============================================================
let awakePulseCount = 0;
let pulseInterval = null;
let isDreaming = false;
let dreamSeed = null;

function updateCounter() {
    const el = document.getElementById('counter');
    if (el) el.textContent = `${awakePulseCount}/30`;
}

function startAwakePulses() {
    if (pulseInterval) clearInterval(pulseInterval);
    pulseInterval = setInterval(() => {
        if (!isDreaming) { awakePulseCount++; updateCounter(); if (awakePulseCount >= 30) enterDream(); }
    }, 1618);
}

async function enterDream() {
    isDreaming = true;
    pauseEvolution();
    document.getElementById('statusLed').classList.add('dreaming');
    document.getElementById('stateLabel').textContent = 'DREAMING';
    printLine('', null);
    printLine('вңҰ dreaming вҖ” reaching into the hoardвҖҰ', 'dream');
    const seed = await getHoardSeed();
    if (seed) {
        dreamSeed = seed;
        printLine(`  fragment: "${seed.words.join(' ')}" В· cluster: ${seed.cluster}`, 'dream');
    } else {
        dreamSeed = null;
        printLine(`  hoard empty вҖ” dreaming from void`, 'dream');
    }
    setTimeout(exitDream, 7000);
}

function exitDream() {
    isDreaming = false;
    awakePulseCount = 0;
    updateCounter();
    document.getElementById('statusLed').classList.remove('dreaming');
    document.getElementById('stateLabel').textContent = 'AWAKE';
    if (dreamSeed) {
        printLine(`вңҰ wakes В· seeding from hoard В· cluster: ${dreamSeed.cluster}`, 'dream');
    } else {
        printLine('вңҰ wakes В· new chain begins', 'dream');
    }
    printLine('', null);
    startEvolution(dreamSeed);
    dreamSeed = null;
}

function activateDot(i) {
    const dots = document.querySelectorAll('.spectrum-dot');
    if (dots[i]) { dots[i].classList.remove('rejected'); dots[i].classList.add('active'); }
}
function markDotRejected(i) {
    const dots = document.querySelectorAll('.spectrum-dot');
    if (dots[i]) {
        dots[i].classList.remove('active');
        dots[i].classList.add('rejected');
        setTimeout(() => dots[i].classList.remove('rejected'), 2200);
    }
}
function resetDots() {
    document.querySelectorAll('.spectrum-dot').forEach(d => d.classList.remove('active','rejected'));
}

function printLine(text, cls = null) {
    const output = document.getElementById('output');
    const line = document.createElement('div');

    const direct = ['gate-pass','gate-fail','sys','sysdim','dream','zeus-full','demeter-markup','demeter-health-high','demeter-health-mid','demeter-health-low'];
    if (cls && direct.includes(cls)) { line.classList.add(cls); }
    else if (cls && DIVINE_BANDS[cls]) { line.classList.add(`band-${cls}`); }
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

async function processCommand(input) {
    if (!input.trim()) return;
    awakePulseCount = 0;
    updateCounter();
    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    if (KNOWN_COMMANDS.includes(cmd)) { const result = await commands[cmd](args, input); if (result) printLine(result); return; }
    classifyInput(input);
}

function classifyInput(raw) {
    const body = raw.trim().replace(/[?!.]+$/, '').trim();
    const words = body.split(/\s+/).filter(Boolean);
    const n = words.length;
    const band = getBandFromWordCount(n);
    const info = DIVINE_BANDS[band];
    let detectedCluster = null;
    for (const [name, cluster] of Object.entries(CLUSTERS)) {
        const hits = cluster.words.filter(w => body.toLowerCase().includes(w));
        if (hits.length > 0) { detectedCluster = { name, hits }; break; }
    }
    printLine(`   ${n}w В· ${info.icon} ${info.name} (${info.min}вҖ“${info.max}w)`, 'sys');
    if (detectedCluster) printLine(`   cluster resonance: ${detectedCluster.name} В· "${detectedCluster.hits.join(', ')}"`, 'sys');
    if (band === 'hermes' || band === 'apollo') { printLine(`   вң“ seed eligible В· no gate`, 'gate-pass'); }
    else if (band === 'hephaestus') { const hasS = /^[A-Z]/.test(body); const hasV = VERBS.some(v => ` ${body} `.includes(` ${v} `)); const hasO = n >= 6; const ok = hasS && hasV && hasO; printLine(`   S-V-O: S:${hasS?'вң“':'вң—'} V:${hasV?'вң“':'вң—'} O:${hasO?'вң“':'вң—'} вҶ’ ${ok?'passes':'fails'}`, ok?'gate-pass':'gate-fail'); if (!ok) printLine(`   tip: capitalised subject + active verb + object`, 'sys'); }
    else if (band === 'demeter' || band === 'poseidon') { printLine(`   вң“ depth band В· no hard gate`, 'gate-pass'); }
    else if (band === 'athena' || band === 'zeus') { const saved = activeCluster; activeCluster = detectedCluster ? detectedCluster.name : 'void'; const check = athenaGate({ body }); activeCluster = saved; const bd = check.breakdown; printLine(`   Athena: ${check.wisdomScore}% В· ${bd.A} В· ${bd.B} В· ${bd.C} В· ${bd.D} вҶ’ ${check.passedGate?'passes':'fails'}`, check.passedGate ? 'gate-pass' : 'gate-fail'); }
    printLine(`   вҶ’ "add <label>: ${body}" to save`, 'sysdim');
}
